<!doctype html>
<html xmlns:th="http://www.thymeleaf.org">
    <head>
        <title>Quản lý Đặt Bàn</title>
    <th:block th:replace="~{base :: css}"></th:block>
</head>
<body>
    <div th:replace="~{base :: header}"></div>

    <section class="container mt-4 mb-5">
        <div class="card shadow-sm border-0 rounded-3">
            <div class="card-header bg-black text-white d-flex justify-content-between align-items-center py-3">
                <h5 class="mb-0" style="color: #e67e22; font-family: 'Playfair Display', serif;">
                    Quản lý Đặt Bàn
                </h5>
                <div class="d-flex gap-2">
                    <select id="statusFilter" class="form-select form-select-sm" style="width: 150px;" onchange="filterReservations()">
                        <option value="" th:selected="${status == null or status == ''}">Tất cả</option>
                        <option value="RESERVED" th:selected="${status == 'RESERVED'}">Đã đặt / Đang sử dụng</option>
                        <option value="CANCELLED" th:selected="${status == 'CANCELLED'}">Đã hủy</option>
                        <option value="COMPLETED" th:selected="${status == 'COMPLETED'}">Hoàn thành</option>
                    </select>
                </div>
            </div>

            <div class="card-body p-4">
                <div class="row g-4" th:if="${!#lists.isEmpty(reservations)}">
                    <div class="col-12 col-md-6 col-lg-4" th:each="r: ${reservations}">
                        <div class="card h-100 border-0 shadow-sm rounded-3" 
                             th:classappend="${r.status == 'RESERVED' ? 'border-primary border-2' : r.status == 'COMPLETED' ? 'border-success border-2' : 'border-danger border-2'}">
                            <div class="card-body p-4">
                                <div class="d-flex justify-content-between align-items-start mb-3">
                                    <div>
                                        <h5 class="card-title fw-bold mb-1" th:text="'Bàn ' + ${r.tableNumber}"></h5>
                                        <small class="text-muted" th:text="${r.tableLocation}"></small>
                                    </div>
                                    <span th:if="${r.status == 'RESERVED'}" class="badge bg-primary rounded-pill px-3 py-2">Đã đặt</span>
                                    <span th:if="${r.status == 'COMPLETED'}" class="badge bg-success rounded-pill px-3 py-2">Hoàn thành</span>
                                    <span th:if="${r.status == 'CANCELLED'}" class="badge bg-danger rounded-pill px-3 py-2">Đã hủy</span>
                                </div>
                                
                                <div class="mb-3">
                                    <div class="d-flex align-items-center mb-2">
                                        <i class="bi bi-person me-2 text-muted"></i>
                                        <span class="fw-semibold" th:text="${r.customerName != null ? r.customerName : r.userFirstName + ' ' + r.userLastName}"></span>
                                    </div>
                                    <div class="d-flex align-items-center mb-2">
                                        <i class="bi bi-people me-2 text-muted"></i>
                                        <span th:text="${r.numberPeople} + ' người'"></span>
                                    </div>
                                    <div class="d-flex align-items-center">
                                        <i class="bi bi-clock me-2 text-muted"></i>
                                        <span th:text="${#dates.format(r.startTime, 'dd/MM/yyyy HH:mm')}"></span>
                                    </div>
                                </div>
                                
                                <div th:if="${r.status == 'RESERVED'}" class="d-flex gap-2 mt-4">
                                    <form th:action="@{/admin/reservations/{reservationId}/complete(reservationId=${r.id})}" method="post" style="flex: 1;">
                                        <button type="submit" class="btn btn-success w-100 rounded-pill">
                                            <i class="bi bi-check-circle me-1"></i>Hoàn thành
                                        </button>
                                    </form>
                                    <form th:action="@{/admin/reservations/{reservationId}/cancel(reservationId=${r.id})}" method="post" style="flex: 1;">
                                        <button type="submit" class="btn btn-outline-danger w-100 rounded-pill">
                                            <i class="bi bi-x-circle me-1"></i>Hủy
                                        </button>
                                    </form>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
                
                <div th:if="${#lists.isEmpty(reservations)}" class="text-center py-5">
                    <i class="bi bi-calendar-x display-4 text-muted mb-3"></i>
                    <p class="text-muted">Không có đặt bàn nào.</p>
                </div>
                
                <!-- Pagination -->
                <nav th:if="${totalPages > 1}" class="mt-4">
                    <div class="d-flex justify-content-between align-items-center mb-3">
                        <span class="text-muted" th:text="'Trang ' + ${currentPage} + ' / ' + ${totalPages}"></span>
                    </div>
                    <ul class="pagination justify-content-center">
                        <li class="page-item" th:class="${currentPage == 1} ? 'disabled' : ''">
                            <a class="page-link" th:href="@{/admin/reservations(status=${status}, page=${currentPage - 1})}">Trước</a>
                        </li>
                        <li class="page-item" th:each="i : ${#numbers.sequence(1, totalPages)}">
                            <a class="page-link" 
                               th:classappend="${i == currentPage ? 'active' : ''}"
                               th:href="@{/admin/reservations(status=${status}, page=${i})}" 
                               th:text="${i}"></a>
                        </li>
                        <li class="page-item" th:class="${currentPage == totalPages} ? 'disabled' : ''">
                            <a class="page-link" th:href="@{/admin/reservations(status=${status}, page=${currentPage + 1})}">Sau</a>
                        </li>
                    </ul>
                </nav>
            </div>
        </div>
    </section>
    <div th:replace="~{base :: footer}"></div>
    
    <script th:src="@{/js/script.js}"></script>
    <script>
        function filterReservations() {
            const status = document.getElementById('statusFilter').value;
            if (status) {
                window.location.href = `/RestaurantApp/admin/reservations?status=${status}`;
            } else {
                window.location.href = '/RestaurantApp/admin/reservations';
            }
        }
    </script>
</body>
</html>
