<!doctype html>
<html xmlns:th="http://www.thymeleaf.org">
    <head>
        <title>Trang chủ</title>
    <th:block th:replace="~{base :: css}"></th:block>
</head>
<body>
    <div th:replace="~{base :: header}"></div>

    <section class="container mt-4 mb-5">
        <div class="card shadow-sm border-0 rounded-3">
            <div class="card-header bg-black text-white d-flex justify-content-between align-items-center py-3">
                <h5 class="mb-0" style="color: #e67e22; font-family: 'Playfair Display', serif;">
                    Danh Sách Đơn hàng
                </h5>
            </div>

            <div class="card-body p-0">
                <div class="table-responsive">
                    <table class="table table-hover align-middle mb-0">
                        <thead class="table-light">
                            <tr>
                                <th class="text-center" style="width: 10%">STT</th>
                                <th style="width: 15%">Ngày tạo</th>
                                <th style="width: 20%">Phương thức thanh toán</th>
                                <th style="width: 15%">Tổng tiền</th>
                                <th class="text-center" style="width: 15%">Trang thái thanh toán</th>
                                <th class="text-center" style="width: 15%">Mã giao dịch</th>
                                <th class="text-center" style="width: 25%">Thao tác</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr th:each="o: ${orders}">
                                <td class="text-center py-2" th:text="${o.id}">
                                </td>
                                <td class="fw-bold" th:text="${#dates.format(o.createdDate, 'dd/MM/yyyy HH:mm')}"></td>
                                <td class="text-muted" th:text="${o.payment}"></td>
                                <td th:text="${o.totalPrice}"></td>

                                <td class="text-center">
                                    <span th:if="${o.statusPay == 'PENDING'}" 
                                          class="badge bg-danger">Chờ xác nhận</span>
                                    <span th:if="${o.statusPay == 'COMPLETED'}" 
                                          class="badge bg-success">Đã thanh toán</span>
                                    <span th:if="${o.statusPay == 'CANCELED'}" 
                                          class="badge bg-warning">Đã hủy</span>
                                </td>

                                <td class="text-center">
                                    <span th:if="${o.transactionId != null}" th:text="${o.transactionId}"></span>
                                    <span th:unless="${o.transactionId != null}" th:text="'Không có'"></span>
                                </td>

                                <td class="text-center">
                                    <div class="d-flex justify-content-center gap-2">
                                        <button th:if="${o.statusPay == 'PENDING'}"
                                                class="btn btn-sm btn-success rounded-pill px-3"
                                                th:onclick="'confirmOrder(' + ${o.id} + ')'">
                                            Xác nhận đơn hàng
                                        </button>
                                    </div>
                                </td>
                            </tr>

                            <tr th:if="${#lists.isEmpty(orders)}">
                                <td colspan="7" class="text-center text-muted py-4">
                                    Chưa có đơn hàng nào trong hệ thống.
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>

            <!-- Pagination -->
            <div class="card-footer bg-light d-flex justify-content-between align-items-center py-3">
                <span class="text-muted" th:text="'Trang ' + ${currentPage} + ' / ' + ${totalPages}"></span>
                <nav>
                    <ul class="pagination pagination-sm mb-0">
                        <li class="page-item" th:class="${currentPage == 1} ? 'disabled' : ''">
                            <a class="page-link" th:href="@{/admin/orders(page=${currentPage - 1}, pageSize=${pageSize})}">Trước</a>
                        </li>
                        <li class="page-item" th:each="i : ${#numbers.sequence(1, totalPages)}">
                            <a class="page-link" 
                               th:classappend="${i == currentPage ? 'active' : ''}"
                               th:href="@{/admin/orders(page=${i}, pageSize=${pageSize})}" 
                               th:text="${i}"></a>
                        </li>
                        <li class="page-item" th:class="${currentPage == totalPages} ? 'disabled' : ''">
                            <a class="page-link" th:href="@{/admin/orders(page=${currentPage + 1}, pageSize=${pageSize})}">Sau</a>
                        </li>
                    </ul>
                </nav>
            </div>
        </div>
    </section>
    <div th:replace="~{base :: footer}"></div>
    <script th:src="@{/js/script.js}"></script>
</body>
</html>
