<!doctype html>
<html xmlns:th="http://www.thymeleaf.org">
    <head>
        <title>Trang chủ</title>
    <th:block th:replace="~{base :: css}"></th:block>
</head>
<body>
    <div th:replace="~{base :: header}"></div>

    <section class="container mt-5 mb-5">
        <div class="card shadow-sm border-0 rounded-3">
            <div class="card-body p-5 text-center">
                <h1 class="display-4 fw-bold mb-3" style="color: #e67e22; font-family: 'Playfair Display', serif;">
                    Chào mừng đến với eRestaurant
                </h1>
                <p class="lead text-muted mb-4">
                    Hệ thống quản lý nhà hàng chuyên nghiệp
                </p>
                <div class="mt-4">
                    <a href="/admin/users" class="btn btn-primary btn-lg rounded-pill px-5 me-3">
                        Quản lý người dùng
                    </a>
                    <a href="/admin/tables" class="btn btn-outline-primary btn-lg rounded-pill px-5">
                        Quản lý bàn
                    </a>
                </div>
            </div>
        </div>
    </section>

    <div th:replace="~{base :: footer}"></div>
    <script th:src="@{/js/script.js}"></script>
</body>
</html>
