<!doctype html>
<html xmlns:th="http://www.thymeleaf.org">
    <head>
        <title>Trang chủ</title>
    <th:block th:replace="~{base :: css}"></th:block>
</head>
<body>
    <div th:replace="~{base :: header}"></div>

    <section class="container mt-4 mb-5">
        <div class="card shadow-sm border-0 rounded-3">
            <div class="card-header bg-black text-white d-flex justify-content-between align-items-center py-3">
                <h5 class="mb-0" style="color: #e67e22; font-family: 'Playfair Display', serif;">
                    👥 Danh Sách Người Dùng
                </h5>
                <a class="btn btn-warning fw-bold text-dark rounded-pill px-4 btn-sm"
                   th:href="@{/admin/users/create}">
                    + Thêm người dùng
                </a>
            </div>

            <div class="card-body p-0">
                <div class="table-responsive">
                    <table class="table table-hover align-middle mb-0">
                        <thead class="table-light">
                            <tr>
                                <th class="text-center" style="width: 10%">Avatar</th>
                                <th style="width: 15%">Tên tài khoản</th>
                                <th style="width: 20%">Họ và tên</th>
                                <th style="width: 15%">Số điện thoại</th>
                                <th class="text-center" style="width: 15%">Vai trò</th>
                                <th class="text-center" style="width: 25%">Thao tác</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr th:each="u: ${users}">
                                <td class="text-center py-2">
                                    <img th:src="${u.avatar}" alt="Avatar" class="rounded-circle shadow-sm" 
                                         style="width: 50px; height: 50px; object-fit: cover;" />
                                </td>
                                <td class="fw-bold" th:text="${u.username}"></td>
                                <td class="text-muted" th:text="${u.firstName + ' ' + u.lastName}"></td>
                                <td th:text="${u.phone}"></td>

                                <td class="text-center">
                                    <span th:class="${u.userRole == 'ROLE_ADMIN' ? 'badge bg-danger' : 
                                          (u.userRole == 'ROLE_CHEF' ? 'badge bg-warning text-dark' : 'badge bg-primary')}" 
                                          th:text="${#strings.replace(u.userRole, 'ROLE_', '')}">
                                    </span>
                                </td>

                                <td class="text-center">
                                    <div class="d-flex justify-content-center gap-2" th:if="${u.userRole != 'ROLE_ADMIN'}">
                                        <a class="btn btn-sm btn-outline-success rounded-pill px-3">Nâng cấp</a>
                                        <button class="btn btn-sm btn-outline-danger rounded-pill px-3">Xóa</button>
                                    </div>
                                </td>
                            </tr>

                            <tr th:if="${#lists.isEmpty(users)}">
                                <td colspan="6" class="text-center text-muted py-4">
                                    Chưa có người dùng nào trong hệ thống.
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </section>
    <div th:replace="~{base :: footer}"></div>
    <script th:src="@{/js/script.js}"></script>
</body>
</html>
