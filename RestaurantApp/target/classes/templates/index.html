<!doctype html>
<html xmlns:th="http://www.thymeleaf.org">
    <head>
        <title>Trang chủ</title>
    <th:block th:replace="base :: css"></th:block>
</head>
<body>
    <div th:replace="base :: header"></div>

    <section class="container">
        <div  class="mt-2">
            <a class="btn btn-info">Thêm sản phẩm</a>
        </div>

        <table class="table table-striped">
            <thead>
                <tr>
                    <th></th>
                    <th>Tên món ăn</th>
                    <th>Mô tả món ăn</th>
                    <th>Thành phần</th>
                    <th>Gía bán</th>
                    <th></th>
                </tr>
            </thead>
            <tbody>
                <tr th:each="d: ${dishes}">
                    <td>
                        <img th:src="${d.image}" width="200" />
                    </td>
                    <td th:text="${d.name}"></td>
                    <td th:text="${d.description}"></td>
                    <td th:text="${d.material}"></td>
                    <td th:text="${d.price} + 'VNĐ'"></td>
                    <td>
                        <!--                        <a th:href="@{/admin/products/} + ${p.id}" class="btn btn-info">Cập nhật</a>
                                                <button class="btn btn-danger" th:onclick="'deleteProduct(\'' + @{/api/products/} + ${p.id} + '\')'">Xóa</button>-->
                        <a  class="btn btn-info">Cập nhật</a>
                        <button class="btn btn-danger">Xóa</button>
                    </td>
                </tr>
            </tbody>
        </table>
    </section>

    <div th:replace="base :: footer"></div>
    <script th:src="@{/js/script.js}"></script>
</body>
</html>
