<!doctype html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/thymeleaf-extras-springsecurity6">
    <head>
        <title>eRestaurant</title>
        <th:block th:fragment="css">
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous" />
        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
        <link rel="stylesheet" th:href="@{/style/style.css}" />
        <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
        </th:block>
    </head>
    <body>
        <header th:fragment="header">
            <nav class="navbar navbar-expand-lg bg-black navbar-dark py-3 shadow-sm">
                <div class="container">
                    <a class="navbar-brand fw-bold" th:href="@{/}">🍽️ eRestaurant Admin</a>
                    
                    <button class="navbar-toggler border-0 shadow-none" type="button" data-bs-toggle="collapse" data-bs-target="#collapsibleNavbar">
                        <span class="navbar-toggler-icon"></span>
                    </button>
                    
                    <div class="collapse navbar-collapse justify-content-end" id="collapsibleNavbar" sec:authorize="isAuthenticated()">
                        <ul class="navbar-nav align-items-center gap-2">
                            <li class="nav-item">
                                <a class="nav-link" th:href="@{/}">Trang chủ</a>
                            </li>
                            <li class="nav-item" th:each="c: ${categories}">
                                <a class="nav-link" href="#" th:text="${c.name}"></a>
                            </li>
                            <li class="nav-item">
                                <a class="nav-link" th:href="@{/admin/users}">Quản lý người dùng</a>
                            </li>
                            <li class="nav-item">
                                <a class="nav-link" th:href="@{/admin/stat}">Báo cáo thống kê</a>
                            </li>
                            <li class="nav-item ms-lg-4 mt-3 mt-lg-0">
                                <a class="btn btn-outline-warning rounded-pill px-4 fw-medium" th:href="@{/logout}">Đăng xuất</a>
                            </li>
                        </ul>
                    </div>
                </div>
            </nav>
        </header>
        
        <footer th:fragment="footer">
            <div class="footer-custom text-center py-4 mt-5">
                <div class="container">
                    <h5 class="navbar-brand mb-1">eRestaurant</h5>
                    <p class="mb-0 small opacity-75">&copy; 2026 Quản lý hệ thống nhà hàng trực tuyến.</p>
                </div>
            </div>
        </footer>
    </body>
</html>
