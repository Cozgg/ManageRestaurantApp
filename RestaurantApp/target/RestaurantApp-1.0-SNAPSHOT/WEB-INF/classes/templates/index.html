<!doctype html>
<html xmlns:th="http://www.thymeleaf.org">
    <head>
        <title>Trang chủ</title>
    <th:block th:replace="~{base :: css}"></th:block>
</head>
<body>
    <div th:replace="~{base :: header}"></div>

    <section class="container mt-4 mb-5">
        <div class="card shadow-sm border-0 rounded-3">
            <div class="card-header bg-black text-white d-flex justify-content-between align-items-center py-3">
                <h5 class="mb-0" style="color: #e67e22; font-family: 'Playfair Display', serif;">
                    🍽️ Danh Sách món ăn
                </h5>
                <a class="btn btn-warning fw-bold text-dark rounded-pill px-4 btn-sm">
                    + Thêm món ăn
                </a>
            </div>

            <div class="card-body p-0">
                <div class="table-responsive">
                    <table class="table table-hover align-middle mb-0">
                        <thead class="table-light">
                            <tr>
                                <th class="text-center" style="width: 15%">Hình ảnh</th>
                                <th style="width: 20%">Tên món ăn</th>
                                <th style="width: 25%">Mô tả</th>
                                <th style="width: 15%">Thành phần</th>
                                <th class="text-center" style="width: 12%">Giá bán</th>
                                <th class="text-center" style="width: 13%">Thao tác</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr th:each="d: ${dishes}">
                                <td class="text-center py-3">
                                    <img th:src="${d.image}" alt="Món ăn" class="img-fluid rounded shadow-sm" 
                                         style="width: 100px; height: 70px; object-fit: cover;" />
                                </td>
                                <td class="fw-bold" th:text="${d.name}"></td>
                                <td class="text-muted small" th:text="${d.description}"></td>
                                <td class="text-muted small" th:text="${d.material}"></td>

                                <td class="text-center fw-semibold text-danger" 
                                    th:text="${#numbers.formatDecimal(d.price, 0, 'COMMA', 0, 'POINT')} + ' ₫'"></td>

                                <td class="text-center">
                                    <div class="d-flex justify-content-center gap-2">
                                        <a class="btn btn-sm btn-outline-primary rounded-pill px-3">Sửa</a>
                                        <button class="btn btn-sm btn-outline-danger rounded-pill px-3">Xóa</button>
                                    </div>
                                </td>
                            </tr>

                            <tr th:if="${#lists.isEmpty(dishes)}">
                                <td colspan="6" class="text-center text-muted py-4">
                                    Chưa có món ăn nào.
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </section>

    <div th:replace="~{base :: footer}"></div>
    <script th:src="@{/js/script.js}"></script>
</body>
</html>
